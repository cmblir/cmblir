name: Update README

on:
  schedule:
    - cron: "0 */6 * * *"  # 6시간마다
  workflow_dispatch:        # 수동 실행 버튼
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://your-blog.dev/rss.xml"
          max_post_count: 5
          comment_tag_name: "BLOG-POST-LIST"

      - name: Pull latest GitHub releases
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://github.com/cmblir/memex/releases.atom,https://github.com/cmblir/lazyclaude/releases.atom"
          max_post_count: 5
          comment_tag_name: "LATEST-RELEASES"
