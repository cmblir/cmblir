name: Update README

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 깃허브 블로그 최신글 가져오기
      - name: Pull latest blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          # 👇 블로그 피드 주소를 입력하세요 (보통 feed.xml 입니다)
          feed_list: "https://cmblir.github.io/feed.xml" 
          max_post_count: 5
          comment_tag_name: "BLOG-POST-LIST"

      # 2. 깃허브 레포지토리 릴리즈 가져오기
      - name: Pull latest GitHub releases
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://github.com/cmblir/memex/releases.atom,https://github.com/cmblir/lazyclaude/releases.atom"
          max_post_count: 5
          comment_tag_name: "LATEST-RELEASES"
