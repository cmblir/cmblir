name: Update README

on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest blog posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://cmblir.github.io/feed.xml"
          max_post_count: 5
          comment_tag_name: "BLOG-POST-LIST"

      - name: Pull latest GitHub releases
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://github.com/cmblir.atom"
          max_post_count: 5
          comment_tag_name: "LATEST-RELEASES"
          filter_routes: "$..[?(!@.link.match(/cmblir\\.github\\.io|github\\.com\\/cmblir\\/cmblir(\\b|$)/))]"
